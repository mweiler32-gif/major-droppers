    // Helper function to normalize names for matching (removes diacritics)
    const normalizeName = (name) => {
      if (!name) return '';
      return name
        // Handle Nordic characters that don't decompose with NFD
        .replace(/[øØ]/g, 'o')
        .replace(/[æÆ]/g, 'ae')
        .replace(/[åÅ]/g, 'a')
        .replace(/[ðÐ]/g, 'd')
        .replace(/[þÞ]/g, 'th')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '') // Remove combining diacritics
        .toLowerCase()
        .replace(/[^a-z\s]/g, '') // Keep only letters and spaces
        .replace(/\s+/g, ' ')
        .trim();
    };
    
    // Helper to check if two names match (handles diacritics)
    const namesMatch = (name1, name2) => {
      const n1 = normalizeName(name1);
      const n2 = normalizeName(name2);
      if (!n1 || !n2) return false;
      return n1 === n2 || n1.includes(n2) || n2.includes(n1);
    };

    const generateSnakeOrder = (players) => {
      const order = [];
      for (let round = 0; round < ROSTER_SIZE; round++) {
        if (round % 2 === 0) {
          order.push(...players);
        } else {
          order.push(...[...players].reverse());
        }
      }
      return order;
    };
    
    // Helper to find score data with fuzzy name matching (handles diacritics)
    const getGolferScoreFromScores = (scores, golferName) => {
      if (!golferName) return {};
      // First try exact match
      if (scores[golferName]) return scores[golferName];
      // Then try fuzzy match
      const matchingKey = Object.keys(scores).find(key => namesMatch(key, golferName));
      return matchingKey ? scores[matchingKey] : {};
    };

    function MajorDroppers() {
      const [players, setPlayers] = useState(DEFAULT_PLAYERS);
      const [teams, setTeams] = useState(() => {
        const initial = {};

      const [scores, setScores] = useState({});
      const [currentRound, setCurrentRound] = useState(0);
      const [tournamentName, setTournamentName] = useState('THE PLAYERS Championship 2026');

      const [connected, setConnected] = useState(false);
      const [syncing, setSyncing] = useState(true);

      const [draftMode, setDraftMode] = useState(false);
      const [availableGolfers, setAvailableGolfers] = useState([]);
      const [draftOrder, setDraftOrder] = useState([]);
      const [currentPick, setCurrentPick] = useState(0);
